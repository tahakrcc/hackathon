spring.application.name=solar-sentinel

# Server
server.port=8080

# PostgreSQL Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hackathon}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123}
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# NASA API Key
nasa.api.key=vgWoHCdHWMbeLdqOcdRi0xrQJDikn4SLGKwjhYEd

# SWPC Base URLs
swpc.base.url=https://services.swpc.noaa.gov
helioviewer.base.url=https://api.helioviewer.org

# Cache (Caffeine)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=60s

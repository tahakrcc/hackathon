<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar Sentinel | Uzay Havası Erken Uyarı Sistemi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&family=Outfit:wght@300;400;600;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      window.addEventListener('error', (event) => {
        const errDiv = document.createElement('div');
        errDiv.style = 'position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(20,0,0,0.9); color:#ff4444; z-index:999999; padding:20px; font-family:monospace; display:flex; flex-direction:column; gap:10px; font-size:14px; overflow-y:auto;';
        errDiv.innerHTML = '<h2>SİSTEM ÇÖKME RAPORU</h2><hr style="border-color:#ff4444">' + 
                           '<b>Error:</b> ' + event.message + '<br>' + 
                           '<b>File:</b> ' + event.filename + ':' + event.lineno + '<br><br>' + 
                           '<b>Stack:</b><br><pre style="white-space:pre-wrap">' + (event.error?.stack || 'No Stack Available') + '</pre>';
        document.body.appendChild(errDiv);
      });
      window.addEventListener('unhandledrejection', (event) => {
        const errDiv = document.createElement('div');
        errDiv.style = 'position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(20,0,0,0.9); color:#ff4444; z-index:999999; padding:20px; font-family:monospace; display:flex; flex-direction:column; gap:10px; font-size:14px; overflow-y:auto;';
        errDiv.innerHTML = '<h2>SİSTEM ÇÖKME RAPORU (PROMISE)</h2><hr style="border-color:#ff4444">' + 
                           '<b>Reason:</b> ' + (event.reason?.message || event.reason) + '<br><br>' + 
                           '<b>Stack:</b><br><pre style="white-space:pre-wrap">' + (event.reason?.stack || 'No Stack Available') + '</pre>';
        document.body.appendChild(errDiv);
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
